name: opencode-review

on:
  pull_request:
    # If force-draft.yml is also installed, remove `opened`; `ready_for_review`
    # becomes the initial review trigger and avoids a cross-workflow race.
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    uses: ekawijayasusilo/shared_workflow/.github/workflows/opencode-review.reusable.yml@main
    secrets:
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
