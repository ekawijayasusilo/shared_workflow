name: Dependabot auto-merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'ekawijayasusilo/shared_workflow'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Read the allowlist from the base branch, not the PR head, so the merge
      # policy can never be changed by the PR being evaluated.
      - name: Checkout base branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Check all updated dependencies against allowlist
        id: allowlist
        env:
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
        run: |
          approved=true
          IFS=',' read -ra deps <<< "$DEPENDENCY_NAMES"
          for dep in "${deps[@]}"; do
            dep="$(echo "$dep" | xargs)"
            if grep -Fxq "$dep" <(grep -v '^\s*#' .github/dependabot-automerge-allowlist.txt | sed 's/\s*$//' | sed '/^$/d'); then
              echo "allowed: $dep"
            else
              echo "not allowlisted: $dep"
              approved=false
            fi
          done
          echo "approved=$approved" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.allowlist.outputs.approved == 'true'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
