name: Dependabot auto-merge
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'ekawijayasusilo/shared_workflow'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Read the allowlist from the base branch, not the PR head, so the merge
      # policy can never be changed by the PR being evaluated.
      - name: Checkout base branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      # Like the allowlist, the script is read from the base-branch checkout,
      # so the PR being evaluated cannot weaken the check it is judged by.
      - name: Check all updated dependencies against allowlist
        id: allowlist
        env:
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
        run: bash .github/scripts/check-dependabot-allowlist.sh "$DEPENDENCY_NAMES" .github/dependabot-automerge-allowlist.txt >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.allowlist.outputs.approved == 'true'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Fixture self-test for the allowlist script; runs only on manual dispatch.
  allowlist-selftest:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run allowlist self-test
        run: |
          set -euo pipefail
          script=.github/scripts/check-dependabot-allowlist.sh
          allowlist=.github/dependabot-automerge-allowlist.txt
          check() {
            local desc="$1" input="$2" want="$3"
            local got
            got="$(bash "$script" "$input" "$allowlist" 2>/dev/null)"
            if [[ "$got" != "approved=$want" ]]; then
              echo "FAIL: $desc (input='$input'): want approved=$want, got '$got'"
              exit 1
            fi
            echo "PASS: $desc"
          }
          check "allowlisted single" "actions/checkout" true
          check "non-allowlisted" "evil/action" false
          check "multi-dep all allowlisted" "actions/checkout, anthropics/claude-code-action" true
          check "multi-dep mixed" "actions/checkout, evil/action" false
          check "empty string" "" false
          check "whitespace-padded" "  actions/checkout  " true
          check "substring" "actions" false
          echo "all allowlist self-tests passed"
