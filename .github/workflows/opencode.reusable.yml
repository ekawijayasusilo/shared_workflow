name: opencode-reusable

on:
  workflow_call:
    secrets:
      OPENCODE_API_KEY:
        required: true

jobs:
  opencode:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      # Default credentials stay on: the comment-triggered assistant needs
      # them to push commits.
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run opencode
        uses: anomalyco/opencode/github@70b56a0a93d366889cae950379cc9d2537148fa2 # v1.18.2
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          use_github_token: true
          model: opencode-go/deepseek-v4-pro
          variant: max
