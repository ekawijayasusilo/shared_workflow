name: opencode-simplify-reusable

on:
  workflow_call:
    secrets:
      OPENCODE_API_KEY:
        required: true

concurrency:
  group: opencode-simplify-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  simplify:
    # Fork PRs and bot-authored PRs (e.g. Dependabot) run without repository
    # secrets, so the action would start with no usable OPENCODE_API_KEY.
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      # PR head (not the detached merge ref) with full history, so the
      # ce-simplify-code skill can resolve its merge-base..HEAD scope (RFC 0002 §3.6).
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      # Prompts live in shared_workflow's prompts/, but this reusable workflow
      # runs in the caller's context (checkout above is the consumer repo), so
      # the prompt is fetched at runtime. Fetched from main by design — callers
      # track @main. $RUNNER_TEMP keeps the reviewed workspace clean.
      - name: Load prompt
        id: prompt
        run: |
          curl -fsSL --retry 3 -o "$RUNNER_TEMP/prompt.md" \
            https://raw.githubusercontent.com/ekawijayasusilo/shared_workflow/main/prompts/opencode-simplify.md
          test -s "$RUNNER_TEMP/prompt.md"
          { echo 'text<<PROMPT_EOF'; cat "$RUNNER_TEMP/prompt.md"; echo 'PROMPT_EOF'; } >> "$GITHUB_OUTPUT"

      - uses: anomalyco/opencode/github@70b56a0a93d366889cae950379cc9d2537148fa2 # v1.18.2
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Merged on top of global + project config ("local" scope), so a
          # consumer repo's own opencode.json still applies. Unpinned on
          # purpose: every run picks up the latest plugin (RFC 0002 §3.7).
          OPENCODE_CONFIG_CONTENT: |
            {
              "plugin": ["compound-engineering@git+https://github.com/EveryInc/compound-engineering-plugin.git"]
            }
        with:
          model: opencode-go/deepseek-v4-pro
          variant: max
          use_github_token: true
          prompt: ${{ steps.prompt.outputs.text }}
