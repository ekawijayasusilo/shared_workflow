name: opencode-review-reusable

on:
  workflow_call:
    secrets:
      OPENCODE_API_KEY:
        required: false

concurrency:
  group: opencode-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Fork PRs and bot-authored PRs (e.g. Dependabot) run without repository
    # secrets, so the action would start with no usable OPENCODE_API_KEY.
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Validate API key
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          if [[ -z "$OPENCODE_API_KEY" ]]; then
            echo "::error::OPENCODE_API_KEY is required for same-repository human PRs"
            exit 1
          fi

      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # The job guard reads the frozen event payload; re-check live draft state
      # so a PR converted to draft after `opened` (force-draft) skips the agent run.
      - name: Re-check draft state
        id: draftcheck
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "is_draft=$(gh pr view ${{ github.event.pull_request.number }} --json isDraft -q .isDraft)" >> "$GITHUB_OUTPUT"

      # Prompts live in shared_workflow's prompts/, but this reusable workflow
      # runs in the caller's context (checkout above is the consumer repo), so
      # the prompt is fetched at runtime. Fetched from main by design — callers
      # track @main. $RUNNER_TEMP keeps the reviewed workspace clean.
      - name: Load prompt
        if: steps.draftcheck.outputs.is_draft == 'false'
        id: prompt
        run: |
          curl -fsSL --retry 3 --max-time 30 --connect-timeout 10 -o "$RUNNER_TEMP/prompt.md" \
            https://raw.githubusercontent.com/ekawijayasusilo/shared_workflow/main/prompts/opencode-review.md
          test -s "$RUNNER_TEMP/prompt.md"
          { echo 'text<<PROMPT_EOF'; cat "$RUNNER_TEMP/prompt.md"; echo 'PROMPT_EOF'; } >> "$GITHUB_OUTPUT"

      - uses: anomalyco/opencode/github@49c69c5ed3ccf706b61b3febb43c8aaff7f8325e # v1.18.4
        if: steps.draftcheck.outputs.is_draft == 'false'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Merged on top of global + project config ("local" scope), so a
          # consumer repo's own opencode.json still applies. Unpinned on
          # purpose: every run picks up the latest plugin (RFC 0001 §3.3).
          OPENCODE_CONFIG_CONTENT: |
            {
              "plugin": ["compound-engineering@git+https://github.com/EveryInc/compound-engineering-plugin.git"]
            }
        with:
          model: opencode-go/deepseek-v4-pro
          variant: max
          use_github_token: true
          prompt: ${{ steps.prompt.outputs.text }}
